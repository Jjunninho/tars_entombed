<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo escuro -->
  <rect width="64" height="64" fill="#0a0a1a"/>
  
  <!-- Borda neon cyan -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#00ffff" stroke-width="2"/>
  
  <!-- Letra T estilizada (TARS) -->
  <g fill="#00ffff">
    <!-- Barra horizontal do T -->
    <rect x="16" y="16" width="32" height="6" rx="1"/>
    <!-- Barra vertical do T -->
    <rect x="29" y="16" width="6" height="32" rx="1"/>
  </g>
  
  <!-- Efeito de "descida" - setas para baixo -->
  <g fill="#ff00ff" opacity="0.8">
    <polygon points="24,50 20,54 24,58"/>
    <polygon points="32,52 28,56 32,60"/>
    <polygon points="40,50 36,54 40,58"/>
  </g>
  
  <!-- Pixels decorativos (estilo retro) -->
  <rect x="12" y="12" width="2" height="2" fill="#00ffff" opacity="0.6"/>
  <rect x="50" y="12" width="2" height="2" fill="#00ffff" opacity="0.6"/>
  <rect x="12" y="50" width="2" height="2" fill="#ff00ff" opacity="0.6"/>
  <rect x="50" y="50" width="2" height="2" fill="#ff00ff" opacity="0.6"/>
</svg>
